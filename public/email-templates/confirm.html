<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your Jotey account</title>
</head>
<body style="margin:0;padding:0;background:#F6F8F7;font-family:Inter,system-ui,-apple-system,sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F6F8F7;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:480px;" cellpadding="0" cellspacing="0">

          <!-- Green header -->
          <tr>
            <td style="background:#388346;border-radius:12px 12px 0 0;padding:32px 40px;text-align:center;">
              <!-- Logo mark: green square with white J shape (SVG not reliable in email — using table-based fallback) -->
              <table role="presentation" align="center" cellpadding="0" cellspacing="0" style="margin:0 auto 16px;">
                <tr>
                  <td style="width:64px;height:64px;background:#2d6b38;border-radius:12px;text-align:center;vertical-align:middle;">
                    <span style="font-size:36px;font-weight:700;color:#ffffff;font-family:Inter,sans-serif;line-height:64px;">J</span>
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-size:24px;font-weight:600;color:#ffffff;letter-spacing:-0.3px;">Jotey</p>
              <p style="margin:8px 0 0;font-size:13px;color:rgba(255,255,255,0.8);">Quote faster. Get paid sooner.</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#ffffff;padding:32px 40px;">
              <h1 style="margin:0 0 8px;font-size:22px;font-weight:600;color:#1F2D37;">Welcome to Jotey</h1>
              <p style="margin:0 0 24px;font-size:16px;color:#4A5B68;">
                Hi{{ if .Data.full_name }} {{ .Data.full_name }}{{ end }},
              </p>
              <p style="margin:0 0 28px;font-size:16px;color:#4A5B68;line-height:1.5;">
                Tap the button below to confirm your email and set up your account.
              </p>

              <!-- CTA button -->
              <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 28px;">
                <tr>
                  <td style="background:#22A67A;border-radius:10px;text-align:center;">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 32px;font-size:16px;font-weight:600;color:#ffffff;text-decoration:none;">Confirm my account</a>
                  </td>
                </tr>
              </table>

              <p style="margin:0;font-size:13px;color:#8CA3A0;text-align:center;">This link expires in 24 hours.</p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#F6F8F7;border-radius:0 0 12px 12px;padding:20px 40px;text-align:center;border-top:1px solid #E4EAE8;">
              <p style="margin:0;font-size:12px;color:#8CA3A0;">
                Jotey — Quoting tools for trades<br />
                <a href="https://jotey.co.nz" style="color:#8CA3A0;text-decoration:none;">jotey.co.nz</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
